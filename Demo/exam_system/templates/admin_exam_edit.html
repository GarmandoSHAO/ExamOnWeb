{% extends 'base.html' %}
{% block title %}{% if exam %}编辑考试{% else %}新建考试{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if exam %}✏️ 编辑考试{% else %}➕ 新建考试{% endif %}</h1>
</div>

<div class="card" style="max-width:700px">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>考试名称 *</label>
        <input class="form-control" name="title" value="{{ exam.title if exam else '' }}" placeholder="例如：Python 基础知识测验" required>
      </div>
      <div class="form-group">
        <label>考试描述</label>
        <textarea class="form-control" name="description" placeholder="简要描述考试内容、要求等...">{{ exam.description if exam else '' }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>考试时长（分钟）</label>
          <input class="form-control" type="number" name="duration" value="{{ exam.duration if exam else 60 }}" min="5" max="300">
        </div>
        <div class="form-group">
          <label>及格分数线（%）</label>
          <input class="form-control" type="number" name="pass_score" value="{{ exam.pass_score if exam else 60 }}" min="1" max="100">
        </div>
      </div>
      <div class="form-group">
        <div class="form-check">
          <input type="checkbox" name="shuffle" id="shuffle" {% if not exam or exam.shuffle %}checked{% endif %}>
          <label for="shuffle">随机打乱题目顺序</label>
        </div>
      </div>
      <hr class="divider">
      <div style="display:flex;gap:.75rem">
        <button type="submit" class="btn btn-primary">💾 保存并管理题目</button>
        <a href="{{ url_for('admin_exams') }}" class="btn btn-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
