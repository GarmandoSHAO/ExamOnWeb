{% extends 'base.html' %}
{% block title %}新建用户{% endblock %}
{% block content %}
<div class="ph">
  <div><h1>➕ 新建用户</h1></div>
  <a href="{{ url_for('admin_users') }}" class="btn bsec">← 返回</a>
</div>
<div class="card" style="max-width:500px">
  <div class="card-bd">
    <form method="POST">
      <div class="fg"><label>姓名</label><input class="fc" name="name" placeholder="真实姓名" required></div>
      <div class="fg"><label>用户名 *</label><input class="fc" name="username" placeholder="登录账号" required></div>
      <div class="fg"><label>密码（默认 123456）</label><input class="fc" name="password" type="password" placeholder="留空则使用 123456"></div>
      <div class="fg"><label>角色</label>
        <select class="fc" name="role">
          <option value="student">学生</option>
          <option value="admin">管理员</option>
        </select>
      </div>
      <hr class="divider">
      <div class="flex gap1">
        <button type="submit" class="btn bp">创建用户</button>
        <a href="{{ url_for('admin_users') }}" class="btn bsec">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
