<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>注册 - 在线考试系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:1rem}
.card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.header{padding:2rem 2.5rem 1.5rem;text-align:center}
.header h1{font-size:1.4rem;color:#1e293b;font-weight:700}
.body{padding:0 2.5rem 2rem}
.form-group{margin-bottom:1.1rem}
label{display:block;font-size:.875rem;font-weight:600;color:#374151;margin-bottom:.35rem}
.form-control{width:100%;padding:.7rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:.9rem;transition:border-color .2s}
.form-control:focus{outline:none;border-color:#667eea}
.btn{width:100%;padding:.8rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
.btn:hover{opacity:.9}
.links{text-align:center;margin-top:1rem;font-size:.875rem;color:#64748b}
.links a{color:#667eea}
.alert{padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.875rem;background:#fee2e2;color:#dc2626;border-left:4px solid #dc2626}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="header">
      <div style="font-size:2.5rem">👤</div>
      <h1>创建账号</h1>
    </div>
    <div class="body">
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in msgs %}<div class="alert">{{ msg }}</div>{% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="form-group">
          <label>姓名</label>
          <input class="form-control" name="name" placeholder="请输入真实姓名" required>
        </div>
        <div class="form-group">
          <label>用户名</label>
          <input class="form-control" name="username" placeholder="设置登录用户名" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input class="form-control" name="password" type="password" placeholder="设置登录密码" required>
        </div>
        <button type="submit" class="btn">注 册</button>
      </form>
      <div class="links">已有账号？<a href="{{ url_for('login') }}">立即登录</a></div>
    </div>
  </div>
</div>
</body>
</html>
