<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 - 在线考试系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#4f46e5,#7c3aed);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.box{width:100%;max-width:410px;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.22);overflow:hidden}
.top{padding:2.2rem 2.5rem 1.5rem;text-align:center}
.top .logo{font-size:2.8rem;margin-bottom:.5rem}
.top h1{font-size:1.4rem;color:#1e293b;font-weight:700}
.top p{color:#64748b;font-size:.85rem;margin-top:.3rem}
.body{padding:0 2.5rem 2.2rem}
.hint{background:#eff6ff;border-radius:9px;padding:.9rem 1rem;margin-bottom:1.2rem;font-size:.78rem;color:#0369a1}
.hint strong{display:block;margin-bottom:.4rem;color:#0c4a6e;font-size:.82rem}
.hint code{background:#dbeafe;padding:.1rem .4rem;border-radius:4px;font-family:monospace}
.fg{margin-bottom:1.1rem}
label{display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:.35rem}
input{width:100%;padding:.7rem 1rem;border:2px solid #e5e7eb;border-radius:9px;font-size:.9rem;transition:border-color .2s;outline:none}
input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.btn{width:100%;padding:.8rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:9px;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.links{text-align:center;margin-top:1rem;font-size:.83rem;color:#64748b}
.links a{color:#4f46e5;font-weight:500}
.alert{padding:.65rem .9rem;border-radius:7px;margin-bottom.9rem;font-size:.83rem;background:#fef2f2;color:#dc2626;border-left:3px solid #dc2626;margin-bottom:1rem}
</style>
</head>
<body>
<div class="box">
  <div class="top"><div class="logo">📝</div><h1>在线考试系统</h1><p>Online Examination System</p></div>
  <div class="body">
    {% with msgs=get_flashed_messages(with_categories=true) %}{% for c,m in msgs %}<div class="alert">{{m}}</div>{% endfor %}{% endwith %}
    <div class="hint">
      <strong>🔑 演示账号</strong>
      管理员：<code>admin</code> / <code>admin123</code><br>
      学　生：<code>student</code> / <code>student123</code>
    </div>
    <form method="POST">
      <div class="fg"><label>用户名</label><input name="username" placeholder="请输入用户名" autofocus required></div>
      <div class="fg"><label>密　码</label><input name="password" type="password" placeholder="请输入密码" required></div>
      <button type="submit" class="btn">登 录</button>
    </form>
    <div class="links">没有账号？<a href="{{ url_for('register') }}">立即注册</a></div>
  </div>
</div>
</body></html>
